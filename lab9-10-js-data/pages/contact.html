<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Контакти | DevData</title>
    <link rel="stylesheet" href="../styles/style.css">
    <script src="../js/main.js" defer></script>
    <script src="../js/catalog.js" defer></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><strong>Dev</strong>Data</div>
        <ul class="nav-list">
            <li><a href="../index.html" class="nav-link">Головна</a></li>
            <li><a href="catalog.html" class="nav-link">Каталог</a></li>
            <li><a href="contact.html" class="nav-link">Контакти</a></li>
        </ul>
        <button class="theme-toggle">🌓</button>
    </nav>

    <main class="content-container">
        <h1>Зв'язатися зі мною</h1>
        <form id="contact-form" style="max-width:500px; margin:2rem auto; text-align:left;">
            <input type="text" name="username" placeholder="Ім'я" required style="width:100%; padding:0.8rem; margin-bottom:1rem; border-radius:10px; border:1px solid #ddd; background:var(--card-bg); color:var(--text);">
            <input type="email" name="email" placeholder="Email" required style="width:100%; padding:0.8rem; margin-bottom:1rem; border-radius:10px; border:1px solid #ddd; background:var(--card-bg); color:var(--text);">
            <textarea name="message" id="message" maxlength="200" placeholder="Повідомлення" style="width:100%; height:100px; padding:0.8rem; border-radius:10px; border:1px solid #ddd; background:var(--card-bg); color:var(--text); resize:none;"></textarea>
            <div id="char-counter" style="text-align:right; font-size:0.8rem; opacity:0.6; margin-bottom:1rem;">0 / 200</div>
            <button type="submit" class="filter-btn" style="width:100%;">Надіслати</button>
        </form>
    </main>

    <footer>
        <p>&copy; <span id="current-year"></span> Created by Геворгян Артем</p>
    </footer>
</body>
</html>
