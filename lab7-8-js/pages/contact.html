<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Зв'язок</title>
    <link rel="stylesheet" href="../styles/style.css">
    <script src="../js/main.js" defer></script>
</head>
<body>
    <nav class="navbar">
        <ul class="nav-list">
            <li><a href="../index.html" class="nav-link">Головна</a></li>
            <li><a href="about.html" class="nav-link">Про нас</a></li>
            <li><a href="contact.html" class="nav-link">Контакти</a></li>
        </ul>
        <button class="theme-toggle">🌓</button>
    </nav>

    <main style="padding: 4rem 10%;">
        <h1 style="text-align: center;">Напишіть нам</h1>
        <form id="contact-form">
            <div class="form-group">
                <label>Ваше ім'я</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Ваш Email</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Повідомлення</label>
                <textarea name="message" maxlength="200" style="height: 150px;"></textarea>
                <div id="char-counter" style="text-align: right; font-size: 0.8rem; opacity: 0.6;">0 / 200</div>
            </div>
            <button type="submit" style="width: 100%;">Надіслати дані</button>
        </form>
    </main>

    <footer style="text-align: center; padding: 2rem;">
        <p>&copy; <span id="current-year"></span></p>
    </footer>
</body>
</html>
